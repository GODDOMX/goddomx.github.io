<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <script>
        const icons = ["👻", "👾", "👽", "🚀", "💸"];
        let i = 0;

        setInterval(() => {
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/svg+xml';
            link.rel = 'icon';

            link.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>${icons[i]}</text></svg>`;

            document.getElementsByTagName('head')[0].appendChild(link);
            i = (i + 1) % icons.length; 
        }, 2000); 
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSH VX</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
